<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Домино - Лобби</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container lobby-container">
        <div class="game-header">
            <h1>🎲 Домино</h1>
            <div class="telegram-user" id="telegramUser"></div>
        </div>

        <div class="lobby-content">
            <div class="create-game-box">
                <h2>Создать игру</h2>
                <div class="settings-mini">
                    <select id="gameStoneType">
                        <option value="classic">Классические (0-6)</option>
                        <option value="extended">Расширенные (0-9)</option>
                        <option value="max">Максимальные (0-12)</option>
                    </select>
                    <select id="gameTableTheme">
                        <option value="green">Зелёный стол</option>
                        <option value="wood">Деревянный стол</option>
                        <option value="dark">Тёмный стол</option>
                    </select>
                </div>
                <button id="createGameBtn" class="btn-primary">➕ Создать игру</button>
            </div>

            <div class="active-games">
                <h2>Активные игры</h2>
                <div id="gamesList" class="games-list">
                    <div class="empty-state">Нет активных игр</div>
                </div>
            </div>

            <div class="waiting-game hidden" id="waitingGame">
                <h2>⏳ Ожидание игрока...</h2>
                <div class="game-code-box">
                    <p>Код игры: <strong id="gameCode"></strong></p>
                    <button id="copyInviteBtn" class="btn-secondary">📋 Скопировать приглашение</button>
                </div>
                <div class="waiting-players">
                    <h3>Игроки:</h3>
                    <ul id="playersList"></ul>
                </div>
                <button id="cancelGameBtn" class="btn-danger">Отменить</button>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="multiplayer.js"></script>
</body>
</html>
