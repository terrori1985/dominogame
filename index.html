<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Домино - Лобби</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container lobby-container">
        <div class="game-header">
            <h1>🎲 Домино</h1>
            <div id="telegramUser" class="telegram-user"></div>
        </div>

        <div class="lobby-content">
            <!-- Создание игры -->
            <div class="create-game-box">
                <h2>🎯 Создать игру</h2>
                <div class="settings-mini">
                    <label>Тип камней:</label>
                    <select id="gameStoneType">
                        <option value="classic">Классические (0-6)</option>
                        <option value="extended">Расширенные (0-9)</option>
                        <option value="max">Максимальные (0-12)</option>
                    </select>
                    
                    <label>Дизайн стола:</label>
                    <select id="gameTableTheme">
                        <option value="green">Зелёный стол</option>
                        <option value="wood">Деревянный стол</option>
                        <option value="dark">Тёмный стол</option>
                    </select>
                </div>
                <button id="createGameBtn" class="btn-primary">➕ Создать игру</button>
            </div>

            <!-- Присоединение по коду -->
            <div class="join-game-box">
                <h2>🔗 Присоединиться</h2>
                <div class="code-input-group">
                    <input type="text" id="gameCodeInput" placeholder="Введите код игры (например: A3F9K2)" maxlength="6" class="code-input">
                    <button id="joinGameBtn" class="btn-secondary">Присоединиться</button>
                </div>
            </div>

            <!-- Ожидание игрока -->
            <div id="waitingGame" class="waiting-game hidden">
                <h2>⏳ Ожидание игрока...</h2>
                <div class="game-code-box">
                    <p>🎫 Код игры:</p>
                    <div class="big-code" id="gameCode"></div>
                    <button id="copyInviteBtn" class="btn-primary">📋 Скопировать код</button>
                    <p class="hint">Отправь этот код другу в Telegram</p>
                </div>
                <div class="waiting-players">
                    <h3>👥 Игроки в лобби:</h3>
                    <ul id="playersList"></ul>
                </div>
                <button id="cancelGameBtn" class="btn-danger">❌ Отменить создание</button>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="multiplayer.js"></script>
</body>
</html>
