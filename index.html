<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Домино - Мультиплеер</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- ЭКРАН ЛОББИ -->
        <div id="lobbyScreen" class="screen active">
            <div class="header">
                <h1>🎲 DOMINO</h1>
                <div class="user-info" id="userInfo"></div>
            </div>

            <div class="lobby-content">
                <div class="create-section">
                    <h2>✨ Создать игру</h2>
                    <div class="settings">
                        <div class="setting">
                            <label>🎴 Камни</label>
                            <select id="stoneType">
                                <option value="classic">Классические (0-6)</option>
                                <option value="extended">Расширенные (0-9)</option>
                                <option value="max">Максимальные (0-12)</option>
                            </select>
                        </div>
                        <div class="setting">
                            <label>🪑 Стол</label>
                            <select id="tableTheme">
                                <option value="green">🌿 Зелёный</option>
                                <option value="wood">🪵 Деревянный</option>
                                <option value="dark">🌙 Тёмный</option>
                            </select>
                        </div>
                    </div>
                    <button id="createGameBtn" class="btn-create">
                        <span>🎮</span> СОЗДАТЬ СТОЛ
                    </button>
                </div>

                <div class="games-section">
                    <div class="section-header">
                        <h2>🪑 Активные столы</h2>
                        <button id="refreshBtn" class="btn-refresh">🔄</button>
                    </div>
                    <div id="gamesList" class="games-list">
                        <div class="loader">Загрузка столов...</div>
                    </div>
                </div>
            </div>

            <div class="connection-status" id="connectionStatus">
                <span class="dot"></span> Подключение...
            </div>
        </div>

        <!-- ЭКРАН ОЖИДАНИЯ -->
        <div id="waitingScreen" class="screen">
            <div class="waiting-container">
                <div class="waiting-animation">
                    <div class="pulse-ring"></div>
                    <div class="pulse-ring delay-1"></div>
                    <div class="pulse-ring delay-2"></div>
                    <span class="waiting-icon">🎲</span>
                </div>
                <h2>Ожидание соперника</h2>
                <p class="waiting-text">Пригласи друга или жди подключения</p>
                <div class="players-waiting">
                    <div class="player-card host">
                        <div class="avatar">👑</div>
                        <span id="hostName">Вы</span>
                    </div>
                    <div class="vs">VS</div>
                    <div class="player-card guest">
                        <div class="avatar">❓</div>
                        <span>Ожидание...</span>
                    </div>
                </div>
                <button id="cancelWaitBtn" class="btn-cancel">❌ Отменить</button>
            </div>
        </div>

        <!-- ЭКРАН ИГРЫ -->
        <div id="gameScreen" class="screen">
            <div class="game-header">
                <div class="opponent-card">
                    <div class="opponent-avatar" id="opponentAvatar">👤</div>
                    <div class="opponent-info">
                        <span id="opponentName">Противник</span>
                        <span class="cards-left" id="opponentCards">0 камней</span>
                    </div>
                </div>
                <div class="game-score" id="gameScore">
                    <span>0 : 0</span>
                </div>
                <button id="leaveGameBtn" class="btn-leave">🚪</button>
            </div>

            <div id="gameTable" class="game-table green">
                <div id="tableDominoes" class="table-dominoes"></div>
            </div>

            <div class="your-card">
                <div class="your-avatar">👤</div>
                <div class="your-info">
                    <span id="yourName">Вы</span>
                    <div id="playerHand" class="hand-container"></div>
                </div>
            </div>

            <div class="game-actions">
                <button id="passBtn" class="btn-pass">⏭ Пропустить</button>
                <div id="turnIndicator" class="turn-indicator waiting">Ожидание...</div>
            </div>
        </div>
    </div>

    <audio id="soundPlace" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/button-click-01.mp3" type="audio/mpeg">
    </audio>
    <audio id="soundWin" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
    </audio>
    <audio id="soundPass" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/failed-01.mp3" type="audio/mpeg">
    </audio>

    <script src="game.js"></script>
</body>
</html>
