<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Домино - Telegram Mini App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="game-header">
            <h1>🎲 Домино</h1>
            <div class="score-board">
                <div class="score player-score">
                    <span>Игрок</span>
                    <strong id="playerScore">0</strong>
                </div>
                <div class="score bot-score">
                    <span>Бот</span>
                    <strong id="botScore">0</strong>
                </div>
            </div>
            <button id="settingsBtn" class="settings-btn">⚙️</button>
        </div>

        <!-- Настройки игры -->
        <div id="settingsPanel" class="settings-panel hidden">
            <h3>Настройки игры</h3>
            
            <div class="setting-group">
                <label>🎴 Тип камней:</label>
                <select id="stoneType">
                    <option value="classic">Классические (0-6)</option>
                    <option value="double">Удвоенные (0-6, все дубли)</option>
                    <option value="extended">Расширенные (0-9)</option>
                    <option value="max">Максимальные (0-12)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>🪑 Дизайн стола:</label>
                <select id="tableTheme">
                    <option value="green">Классический зелёный</option>
                    <option value="wood">Деревянный стол</option>
                    <option value="dark">Тёмная тема</option>
                    <option value="marble">Мраморный стол</option>
                </select>
            </div>

            <div class="setting-group">
                <label>🤖 Сложность бота:</label>
                <select id="botDifficulty">
                    <option value="easy">Лёгкая</option>
                    <option value="medium" selected>Средняя</option>
                    <option value="hard">Сложная</option>
                </select>
            </div>

            <button id="applySettings" class="btn-primary">Применить настройки</button>
        </div>

        <!-- Игровое поле -->
        <div id="gameTable" class="game-table green">
            <div id="tableDominoes" class="table-dominoes"></div>
        </div>

        <!-- Рука игрока -->
        <div class="player-hand">
            <h3>Ваши камни:</h3>
            <div id="playerHand" class="hand-container"></div>
        </div>

        <!-- Кнопки управления -->
        <div class="game-controls">
            <button id="passBtn" class="btn-secondary">Пропустить ход</button>
            <button id="newGameBtn" class="btn-primary">Новая игра</button>
        </div>

        <div id="gameStatus" class="game-status"></div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config.js"></script>
    <script src="game.js"></script>
</body>
</html>
