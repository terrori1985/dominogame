<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎲 Domino</title>
<script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
<style>
:root {
  --felt: #1a4a2e;
  --felt-light: #1e5535;
  --felt-dark: #122d1d;
  --gold: #d4a843;
  --gold-light: #f0c862;
  --gold-dark: #a07820;
  --tile-bg: #fdf8ee;
  --tile-border: #c8b88a;
  --tile-dot: #1a1a1a;
  --tile-shadow: rgba(0,0,0,0.4);
  --text-on-felt: #e8d9b0;
  --panel-bg: rgba(0,0,0,0.45);
  --panel-border: rgba(212,168,67,0.3);
  --accent: #e8a020;
  --danger: #e05050;
  --success: #50c878;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--felt-dark);
  color: var(--text-on-felt);
  user-select: none;
}

/* SCREENS */
.screen { position: absolute; inset: 0; display: none; flex-direction: column; }
.screen.active { display: flex; }

/* LOBBY */
#lobby-screen {
  background: linear-gradient(160deg, #0d2d1a 0%, #1a4a2e 50%, #0d2d1a 100%);
}

.lobby-header {
  padding: 20px 16px 12px;
  text-align: center;
  border-bottom: 1px solid var(--panel-border);
  background: var(--panel-bg);
}
.lobby-title {
  font-size: 28px;
  font-weight: 800;
  color: var(--gold-light);
  text-shadow: 0 0 20px rgba(240,200,98,0.4);
  letter-spacing: 2px;
}
.lobby-title span { font-size: 32px; }
.player-badge {
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: 8px; padding: 6px 14px;
  background: rgba(212,168,67,0.15);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  font-size: 14px; color: var(--gold);
}

.search-bar {
  display: flex; gap: 8px;
  padding: 12px 16px;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--panel-border);
}
.search-bar input {
  flex: 1;
  padding: 10px 14px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  color: #fff; font-size: 15px;
  outline: none;
}
.search-bar input::placeholder { color: rgba(255,255,255,0.35); }
.search-bar input:focus { border-color: var(--gold); }

.tables-list {
  flex: 1; overflow-y: auto;
  padding: 12px 16px;
}
.tables-list::-webkit-scrollbar { width: 4px; }
.tables-list::-webkit-scrollbar-track { background: transparent; }
.tables-list::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }

.table-card {
  display: flex; align-items: center;
  padding: 14px 16px; margin-bottom: 10px;
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.2s;
  animation: slideIn 0.3s ease;
}
.table-card:hover { border-color: var(--gold); background: rgba(0,0,0,0.6); transform: translateY(-1px); }
.table-card:active { transform: scale(0.98); }
.table-icon {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--felt), var(--felt-light));
  border: 2px solid var(--gold-dark);
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin-right: 12px; flex-shrink: 0;
}
.table-info { flex: 1; }
.table-name { font-weight: 700; font-size: 16px; color: var(--gold-light); }
.table-meta { font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 3px; }
.table-players {
  display: flex; align-items: center; gap: 4px;
  font-size: 14px; font-weight: 600;
  color: var(--gold);
}
.table-status {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 8px var(--success);
  margin-left: 4px;
}
.no-tables {
  text-align: center; padding: 40px 20px;
  color: rgba(255,255,255,0.3); font-size: 15px;
}
.no-tables div { font-size: 40px; margin-bottom: 12px; }

.lobby-footer {
  padding: 12px 16px 24px;
  display: flex; gap: 10px;
  background: var(--panel-bg);
  border-top: 1px solid var(--panel-border);
}
.btn {
  flex: 1; padding: 14px;
  border: none; border-radius: var(--radius);
  font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
  letter-spacing: 0.5px;
}
.btn:active { transform: scale(0.96); }
.btn-primary {
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  color: #1a1a1a;
  box-shadow: 0 4px 15px rgba(212,168,67,0.3);
}
.btn-primary:hover { box-shadow: 0 6px 20px rgba(212,168,67,0.45); }
.btn-secondary {
  background: rgba(255,255,255,0.08);
  color: var(--text-on-felt);
  border: 1px solid var(--panel-border);
}

/* WAITING ROOM */
#waiting-screen {
  background: linear-gradient(160deg, #0d2d1a 0%, #1a4a2e 50%, #0d2d1a 100%);
}
.waiting-header {
  padding: 20px 16px 16px;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--panel-border);
  display: flex; align-items: center; gap: 12px;
}
.back-btn {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.1);
  border: 1px solid var(--panel-border);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px;
  transition: all 0.2s;
}
.back-btn:active { transform: scale(0.9); }
.waiting-title { flex: 1; }
.waiting-title h2 { font-size: 20px; font-weight: 700; color: var(--gold-light); }
.waiting-title p { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 2px; }
.table-id-badge {
  padding: 6px 12px;
  background: rgba(212,168,67,0.15);
  border: 1px solid var(--panel-border);
  border-radius: 8px;
  font-size: 13px; font-weight: 700;
  color: var(--gold); letter-spacing: 1px;
}
.players-grid {
  flex: 1; padding: 20px 16px;
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; align-content: start;
}
.player-slot {
  padding: 16px; border-radius: var(--radius);
  border: 1px solid var(--panel-border);
  text-align: center; min-height: 90px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; animation: fadeIn 0.3s ease;
}
.player-slot.filled {
  background: var(--panel-bg);
  border-color: var(--gold-dark);
}
.player-slot.empty {
  background: rgba(255,255,255,0.03);
  border-style: dashed;
}
.player-slot.host-slot { border-color: var(--gold); }
.player-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: #1a1a1a;
}
.player-slot-name { font-size: 14px; font-weight: 600; color: var(--text-on-felt); }
.host-crown { font-size: 12px; color: var(--gold); }
.empty-icon { font-size: 28px; color: rgba(255,255,255,0.15); }
.empty-text { font-size: 13px; color: rgba(255,255,255,0.25); }

.waiting-footer {
  padding: 16px; background: var(--panel-bg);
  border-top: 1px solid var(--panel-border);
}
.waiting-status {
  text-align: center; margin-bottom: 12px;
  font-size: 14px; color: rgba(255,255,255,0.6);
}

/* GAME SCREEN */
#game-screen {
  background: radial-gradient(ellipse at center, var(--felt) 0%, var(--felt-dark) 100%);
  overflow: hidden;
}

/* Top bar */
.game-topbar {
  display: flex; align-items: center;
  padding: 8px 12px; gap: 8px;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--panel-border);
  z-index: 10;
}
.score-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  background: rgba(212,168,67,0.12);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  font-size: 13px; font-weight: 700;
  white-space: nowrap;
}
.score-chip .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold);
}
.score-chip.active { border-color: var(--gold); background: rgba(212,168,67,0.2); }
.boneyard-counter {
  margin-left: auto;
  padding: 5px 12px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  font-size: 13px; color: rgba(255,255,255,0.7);
}

/* Board */
.board-area {
  flex: 1; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.board-table {
  position: absolute;
  width: calc(100% - 24px); height: calc(100% - 16px);
  border-radius: 24px;
  background: radial-gradient(ellipse at center, #1e5535 0%, #1a4a2e 60%, #122d1d 100%);
  border: 3px solid var(--gold-dark);
  box-shadow: inset 0 0 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(212,168,67,0.1);
  overflow: hidden;
}
.board-felt-pattern {
  position: absolute; inset: 0; opacity: 0.04;
  background-image: repeating-linear-gradient(45deg, #fff 0px, #fff 1px, transparent 1px, transparent 8px),
                    repeating-linear-gradient(-45deg, #fff 0px, #fff 1px, transparent 1px, transparent 8px);
}
.board-tiles {
  position: relative; z-index: 2;
  display: flex; align-items: center;
  padding: 8px; gap: 3px;
  max-width: 100%; overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.board-tiles::-webkit-scrollbar { display: none; }

.board-ends {
  position: absolute; bottom: 8px;
  display: flex; gap: 16px;
  z-index: 3; width: 100%; justify-content: center;
}
.end-badge {
  padding: 4px 12px;
  background: rgba(0,0,0,0.5);
  border: 1px solid var(--panel-border);
  border-radius: 12px;
  font-size: 13px; font-weight: 700; color: var(--gold);
}

/* Players around table */
.opponents-area {
  display: flex; justify-content: space-around;
  padding: 8px 12px;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--panel-border);
}
.opponent-card {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; padding: 6px 10px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  transition: all 0.3s; min-width: 70px;
}
.opponent-card.active {
  border-color: var(--gold);
  background: rgba(212,168,67,0.1);
  animation: pulseGold 1.5s infinite;
}
.opp-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, #2a5a3e, #3a7a5e);
  border: 2px solid transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--gold-light);
  transition: border-color 0.3s;
}
.opponent-card.active .opp-avatar { border-color: var(--gold); }
.opp-name { font-size: 11px; color: rgba(255,255,255,0.6); max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.opp-tiles {
  display: flex; gap: 2px;
}
.mini-tile {
  width: 8px; height: 14px;
  background: var(--tile-bg);
  border-radius: 2px;
  border: 1px solid var(--tile-border);
}
.opp-score { font-size: 12px; font-weight: 700; color: var(--gold); }

/* My hand */
.my-hand-area {
  background: var(--panel-bg);
  border-top: 1px solid var(--panel-border);
  padding: 10px 0 16px;
}
.hand-label {
  text-align: center; font-size: 11px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase;
}
.hand-tiles {
  display: flex; justify-content: center;
  gap: 6px; padding: 0 12px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.hand-tiles::-webkit-scrollbar { display: none; }

/* ACTION BUTTONS */
.action-bar {
  display: flex; gap: 8px;
  padding: 8px 12px;
  background: var(--panel-bg);
  border-top: 1px solid var(--panel-border);
}
.action-btn {
  flex: 1; padding: 11px 8px;
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  background: rgba(255,255,255,0.07);
  color: var(--text-on-felt);
  font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.action-btn:active { transform: scale(0.95); }
.action-btn.draw { border-color: var(--accent); color: var(--accent); }
.action-btn.draw:hover { background: rgba(232,160,32,0.15); }
.action-btn.pass { border-color: rgba(255,255,255,0.3); }
.action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* DOMINO TILES */
.domino-tile {
  position: relative;
  display: inline-flex; flex-direction: column;
  background: var(--tile-bg);
  border: 2px solid var(--tile-border);
  border-radius: 7px;
  box-shadow: 2px 3px 8px var(--tile-shadow), inset 0 1px 0 rgba(255,255,255,0.8);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  flex-shrink: 0;
  overflow: hidden;
}
.domino-tile:hover { transform: translateY(-4px) scale(1.05); box-shadow: 3px 8px 16px var(--tile-shadow); }
.domino-tile:active { transform: scale(0.95); }
.domino-tile.selected {
  border-color: var(--gold);
  transform: translateY(-8px);
  box-shadow: 0 10px 24px rgba(212,168,67,0.5);
}
.domino-tile.playable {
  border-color: var(--success);
  animation: glowGreen 1.5s infinite;
}
.domino-tile.board-tile {
  cursor: default;
  transform: none !important;
}
.domino-tile.board-tile:hover { transform: none; box-shadow: 2px 3px 8px var(--tile-shadow); }
.domino-tile.horizontal { flex-direction: row; }

/* Tile sizes */
.tile-hand { width: 36px; height: 64px; }
.tile-hand .tile-half { width: 36px; height: 32px; }
.tile-board { width: 30px; height: 52px; }
.tile-board .tile-half { width: 30px; height: 26px; }
.tile-board.horizontal { width: 52px; height: 30px; }
.tile-board.horizontal .tile-half { width: 26px; height: 30px; }

.tile-half {
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.tile-divider-h {
  width: calc(100% - 8px); height: 1px;
  background: rgba(0,0,0,0.18); margin: 0 4px;
}
.tile-divider-v {
  width: 1px; height: calc(100% - 8px);
  background: rgba(0,0,0,0.18); margin: 4px 0;
}

/* Dot grid */
.dots {
  display: grid;
  width: 100%; height: 100%;
  padding: 4px;
}
.d1 { grid-template: 1fr / 1fr; }
.d2h { grid-template: 1fr 1fr / 1fr; }
.d2 { grid-template: 1fr / 1fr 1fr; }
.d3 { grid-template: 1fr 1fr 1fr / 1fr; }
.d4 { grid-template: 1fr 1fr / 1fr 1fr; }
.d5 { grid-template: 1fr 1fr 1fr / 1fr 1fr; }
.d6 { grid-template: 1fr 1fr 1fr / 1fr 1fr; }

.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--tile-dot);
  place-self: center;
  box-shadow: inset 1px 1px 2px rgba(255,255,255,0.1);
}
.tile-hand .dot { width: 7px; height: 7px; }
.tile-board .dot { width: 5px; height: 5px; }

/* MODALS */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  display: none; align-items: flex-end; justify-content: center;
  background: rgba(0,0,0,0.7);
}
.modal-overlay.active { display: flex; }
.modal-sheet {
  width: 100%; max-width: 480px;
  background: #0d2d1a;
  border-top: 2px solid var(--gold-dark);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px 36px;
  animation: slideUp 0.3s ease;
}
.modal-handle {
  width: 40px; height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  margin: -8px auto 16px;
}
.modal-title {
  font-size: 22px; font-weight: 800;
  text-align: center; color: var(--gold-light);
  margin-bottom: 8px;
}
.modal-subtitle {
  font-size: 14px; text-align: center;
  color: rgba(255,255,255,0.55);
  margin-bottom: 20px;
}
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; color: rgba(255,255,255,0.55); margin-bottom: 6px; }
.form-input {
  width: 100%; padding: 12px 14px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  color: #fff; font-size: 15px; outline: none;
}
.form-input:focus { border-color: var(--gold); }
.form-select {
  width: 100%; padding: 12px 14px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  color: #fff; font-size: 15px; outline: none;
  -webkit-appearance: none;
}
.form-select option { background: #1a4a2e; }
.modal-btns { display: flex; gap: 10px; margin-top: 20px; }

/* GAME OVER MODAL */
.gameover-modal {
  position: fixed; inset: 0; z-index: 200;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.8);
}
.gameover-modal.active { display: flex; }
.gameover-card {
  background: linear-gradient(160deg, #0d2d1a, #1a4a2e);
  border: 2px solid var(--gold);
  border-radius: 20px;
  padding: 32px 24px;
  width: calc(100% - 32px); max-width: 360px;
  text-align: center;
  animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.gameover-icon { font-size: 64px; margin-bottom: 12px; }
.gameover-title { font-size: 32px; font-weight: 900; color: var(--gold-light); margin-bottom: 4px; }
.gameover-subtitle { font-size: 16px; color: rgba(255,255,255,0.6); margin-bottom: 24px; }
.scores-list { margin-bottom: 24px; }
.score-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; margin-bottom: 8px;
  background: rgba(0,0,0,0.35);
  border-radius: var(--radius);
  border: 1px solid var(--panel-border);
}
.score-row.winner { border-color: var(--gold); background: rgba(212,168,67,0.12); }
.score-player { font-size: 15px; font-weight: 600; }
.score-pts { font-size: 18px; font-weight: 800; color: var(--gold); }

/* TOAST */
.toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
  padding: 10px 20px;
  background: rgba(0,0,0,0.85);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  font-size: 14px; color: #fff;
  z-index: 300;
  opacity: 0; transition: all 0.25s;
  pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* TURN INDICATOR */
.turn-banner {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  padding: 6px 16px;
  background: rgba(212,168,67,0.9);
  border-radius: 20px;
  font-size: 14px; font-weight: 700; color: #1a1a1a;
  z-index: 5;
  animation: bounceIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* SIDE SELECTION */
.side-modal {
  position: fixed; inset: 0; z-index: 150;
  display: none; align-items: flex-end; justify-content: center;
  background: rgba(0,0,0,0.6);
}
.side-modal.active { display: flex; }
.side-sheet {
  width: 100%; max-width: 480px;
  background: #0d2d1a;
  border-top: 2px solid var(--gold-dark);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px 40px;
  animation: slideUp 0.3s ease;
}
.side-options {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-top: 16px;
}
.side-btn {
  padding: 20px 12px;
  background: rgba(255,255,255,0.07);
  border: 2px solid var(--panel-border);
  border-radius: var(--radius);
  color: var(--text-on-felt);
  font-size: 16px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  text-align: center;
}
.side-btn:hover { border-color: var(--gold); background: rgba(212,168,67,0.15); }
.side-btn:active { transform: scale(0.95); }
.side-btn .side-icon { font-size: 28px; margin-bottom: 6px; display: block; }
.side-cancel {
  width: 100%; margin-top: 12px;
  padding: 14px;
  background: transparent;
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  color: rgba(255,255,255,0.5);
  font-size: 15px; cursor: pointer;
}

/* ANIMATIONS */
@keyframes slideIn { from { opacity:0; transform: translateX(-20px); } to { opacity:1; transform: translateX(0); } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes fadeIn { from { opacity:0; transform: scale(0.9); } to { opacity:1; transform: scale(1); } }
@keyframes popIn { from { opacity:0; transform: scale(0.7); } to { opacity:1; transform: scale(1); } }
@keyframes bounceIn { from { opacity:0; transform: translateX(-50%) scale(0.8); } to { opacity:1; transform: translateX(-50%) scale(1); } }
@keyframes tilePlace { 0% { transform: scale(0) rotate(180deg); opacity:0; } 60% { transform: scale(1.15) rotate(-5deg); } 100% { transform: scale(1) rotate(0deg); opacity:1; } }
@keyframes pulseGold { 0%,100% { box-shadow: 0 0 0 0 rgba(212,168,67,0.4); } 50% { box-shadow: 0 0 0 6px rgba(212,168,67,0); } }
@keyframes glowGreen { 0%,100% { box-shadow: 0 0 0 0 rgba(80,200,120,0.5); } 50% { box-shadow: 0 0 8px 3px rgba(80,200,120,0.3); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

</style>

<script>
// ── STATE ──────────────────────────────────────────
const state = {
  socket: null,
  player: { id: null, name: 'Игрок', avatar: '🎲' },
  tableId: null,
  tableState: null,
  selectedTileIdx: null,
  allTables: [],
  gamesPlayed: 0,
  isMyTurn: false
};

// ── AUDIO ENGINE ───────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playSound(type) {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;

    const sounds = {
      place: () => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.setValueAtTime(440, now);
        o.frequency.exponentialRampToValueAtTime(280, now + 0.15);
        g.gain.setValueAtTime(0.3, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        o.start(now); o.stop(now + 0.2);
      },
      draw: () => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'triangle';
        o.frequency.setValueAtTime(300, now);
        o.frequency.exponentialRampToValueAtTime(500, now + 0.1);
        g.gain.setValueAtTime(0.2, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        o.start(now); o.stop(now + 0.15);
      },
      win: () => {
        [523, 659, 784, 1047].forEach((freq, i) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value = freq;
          const t = now + i * 0.12;
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.25, t + 0.05);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
          o.start(t); o.stop(t + 0.35);
        });
      },
      lose: () => {
        [400, 300, 200].forEach((freq, i) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value = freq;
          const t = now + i * 0.15;
          g.gain.setValueAtTime(0.2, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
          o.start(t); o.stop(t + 0.3);
        });
      },
      join: () => {
        [660, 880].forEach((freq, i) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.type = 'sine';
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value = freq;
          const t = now + i * 0.1;
          g.gain.setValueAtTime(0.15, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
          o.start(t); o.stop(t + 0.2);
        });
      },
      error: () => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'sawtooth';
        o.connect(g); g.connect(ctx.destination);
        o.frequency.setValueAtTime(200, now);
        g.gain.setValueAtTime(0.15, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        o.start(now); o.stop(now + 0.1);
      },
      turn: () => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'sine';
        o.connect(g); g.connect(ctx.destination);
        o.frequency.setValueAtTime(600, now);
        o.frequency.exponentialRampToValueAtTime(900, now + 0.08);
        g.gain.setValueAtTime(0.2, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        o.start(now); o.stop(now + 0.15);
      }
    };

    if (sounds[type]) sounds[type]();
  } catch(e) {}
}

// ── VIBRATION ──────────────────────────────────────
function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

// ── TOAST ──────────────────────────────────────────
let toastTimer;
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}

// ── CONFETTI ───────────────────────────────────────
function spawnConfetti() {
  const colors = ['#d4a843','#f0c862','#50c878','#e05050','#6ab4f5','#ffffff'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left:${Math.random()*100}vw;
        top:-10px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>0.5?'50%':'2px'};
        animation-duration:${1.5+Math.random()*1.5}s;
        animation-delay:${Math.random()*0.5}s;
        transform:rotate(${Math.random()*360}deg);
      `;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }, i * 30);
  }
}

// ── DOMINO TILE RENDERER ───────────────────────────
const DOT_LAYOUTS = {
  0: [],
  1: [[1,1]],
  2: [[0,0],[2,2]],
  3: [[0,0],[1,1],[2,2]],
  4: [[0,0],[0,2],[2,0],[2,2]],
  5: [[0,0],[0,2],[1,1],[2,0],[2,2]],
  6: [[0,0],[0,2],[1,0],[1,2],[2,0],[2,2]]
};

function renderDots(n, cls='') {
  const layout = DOT_LAYOUTS[n] || [];
  const grid = document.createElement('div');
  grid.className = 'dots d' + (n === 2 ? '2' : n);

  if (n === 0) {
    grid.style.cssText = 'width:100%;height:100%';
    return grid;
  }

  // Use 3x3 grid for positioning
  const cells = {};
  for (let r=0;r<3;r++) for(let c=0;c<3;c++) cells[`${r}${c}`]=null;
  layout.forEach(([r,c]) => cells[`${r}${c}`] = 'dot');

  grid.style.cssText = `
    display:grid;
    grid-template-rows:1fr 1fr 1fr;
    grid-template-columns:1fr 1fr 1fr;
    width:100%;height:100%;padding:3px;gap:1px;
  `;

  for (let r=0;r<3;r++) {
    for (let c=0;c<3;c++) {
      const cell = document.createElement('div');
      cell.style.cssText = 'display:flex;align-items:center;justify-content:center;';
      if (cells[`${r}${c}`]) {
        const dot = document.createElement('div');
        dot.className = 'dot' + (cls ? ' '+cls : '');
        cell.appendChild(dot);
      }
      grid.appendChild(cell);
    }
  }
  return grid;
}

function createTileEl(a, b, size='hand', isNew=false, isSelected=false, isPlayable=false) {
  const tile = document.createElement('div');
  const isHoriz = size === 'board';
  tile.className = `domino-tile tile-${size}${isHoriz?' horizontal':''}${isNew?' tile-new':''}${isSelected?' selected':''}${isPlayable?' playable':''}`;

  const topHalf = document.createElement('div');
  topHalf.className = 'tile-half';
  topHalf.appendChild(renderDots(a));

  const div = document.createElement('div');
  div.className = isHoriz ? 'tile-divider-v' : 'tile-divider-h';

  const botHalf = document.createElement('div');
  botHalf.className = 'tile-half';
  botHalf.appendChild(renderDots(b));

  tile.appendChild(topHalf);
  tile.appendChild(div);
  tile.appendChild(botHalf);
  return tile;
}

// ── SOCKET CONNECTION ──────────────────────────────
function connectSocket() {
  const socket = io(window.location.origin, {
    transports: ['websocket','polling'],
    reconnection: true
  });
  state.socket = socket;

  socket.on('connect', () => {
    socket.emit('register', {
      name: state.player.name,
      avatar: state.player.avatar,
      telegramId: state.player.telegramId
    });
    refreshTables();
  });

  socket.on('registered', ({ id }) => {
    state.player.id = id;
  });

  socket.on('tablesList', (tables) => {
    state.allTables = tables;
    renderTables(tables);
    updateCounters();
  });

  socket.on('tablesUpdate', (tables) => {
    state.allTables = tables;
    renderTables(tables);
    updateCounters();
  });

  socket.on('tableCreated', ({ tableId }) => {
    state.tableId = tableId;
    showScreen('waiting-screen');
    document.getElementById('table-id-display').textContent = tableId;
    playSound('join');
  });

  socket.on('tableState', (ts) => {
    state.tableState = ts;
    if (ts.status === 'waiting') {
      renderWaiting(ts);
    }
  });

  socket.on('playerJoined', ({ player }) => {
    playSound('join');
    showToast(`${player.name} присоединился!`);
    vibrate(50);
  });

  socket.on('gameStarted', (ts) => {
    state.tableState = ts;
    showScreen('game-screen');
    renderGame(ts);
    playSound('join');
    vibrate([50,30,50]);
    showToast('🎲 Игра началась!');
  });

  socket.on('tilePlayed', ({ playerName }) => {
    playSound('place');
    vibrate(30);
  });

  socket.on('tileDrawn', ({ tile }) => {
    playSound('draw');
    showToast(`Взята кость [${tile[0]}|${tile[1]}]`);
  });

  socket.on('playerLeft', () => {
    showToast('Игрок покинул стол');
  });

  socket.on('gameOver', ({ winner, scores, reason }) => {
    state.gamesPlayed++;
    const isWin = winner === state.player.id;
    if (isWin) { spawnConfetti(); playSound('win'); vibrate([100,50,100,50,200]); }
    else { playSound('lose'); vibrate([200]); }
    showGameOver(winner, scores, reason);
  });

  socket.on('error', (msg) => {
    showToast('⚠️ ' + msg);
    playSound('error');
    vibrate([50,50,50]);
  });

  return socket;
}

// ── INIT ───────────────────────────────────────────
function init() {
  // Telegram WebApp init
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    const user = tg.initDataUnsafe?.user;
    if (user) {
      state.player.name = user.first_name + (user.last_name ? ' '+user.last_name : '');
      state.player.telegramId = user.id;
      state.player.avatar = user.first_name[0].toUpperCase();
    }
  } else {
    const names = ['Виктор','Анна','Максим','Олена','Дмитро','Катерина'];
    state.player.name = names[Math.floor(Math.random()*names.length)];
    state.player.avatar = state.player.name[0];
    state.player.telegramId = Math.floor(Math.random()*1e9);
  }

  document.getElementById('lobby-name').textContent = state.player.name;
  document.getElementById('lobby-avatar').textContent = state.player.avatar;

  connectSocket();
}

// ── SCREENS ────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── LOBBY ──────────────────────────────────────────
function refreshTables() {
  state.socket?.emit('getTables');
}

function filterTables() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = state.allTables.filter(t =>
    t.hostName.toLowerCase().includes(q) ||
    t.id.toLowerCase().includes(q)
  );
  renderTables(filtered);
}

function renderTables(tables) {
  const list = document.getElementById('tables-list');
  if (!tables.length) {
    list.innerHTML = `<div class="no-tables"><div>🎲</div>Активных столов нет.<br>Создайте свой или подождите.</div>`;
    return;
  }
  list.innerHTML = tables.map(t => `
    <div class="table-card" onclick="joinTable('${t.id}')">
      <div class="table-icon">🎲</div>
      <div class="table-info">
        <div class="table-name">${escHtml(t.hostName)}'s стол</div>
        <div class="table-meta">ID: ${t.id} • ${formatTime(t.createdAt)}</div>
      </div>
      <div>
        <div class="table-players">
          ${t.playerCount}/${t.maxPlayers}
          <div class="table-status"></div>
        </div>
      </div>
    </div>
  `).join('');
}

function updateCounters() {
  document.getElementById('cnt-tables').textContent = state.allTables.length;
  const totalPlayers = state.allTables.reduce((s,t) => s + t.playerCount, 0);
  document.getElementById('cnt-players').textContent = totalPlayers;
  document.getElementById('cnt-games').textContent = state.gamesPlayed;
}

function formatTime(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return 'только что';
  if (diff < 3600) return Math.floor(diff/60) + ' мин назад';
  return Math.floor(diff/3600) + ' ч назад';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function quickJoin() {
  const available = state.allTables.filter(t => t.playerCount < t.maxPlayers);
  if (available.length) {
    joinTable(available[0].id);
  } else {
    showCreateModal();
  }
}

// ── CREATE TABLE ───────────────────────────────────
function showCreateModal() {
  document.getElementById('create-modal').classList.add('active');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

function createTable() {
  const maxPlayers = parseInt(document.getElementById('max-players').value);
  const isPrivate = document.getElementById('table-private').value === 'true';
  state.socket.emit('createTable', { maxPlayers, isPrivate });
  closeModal('create-modal');
}

// ── JOIN TABLE ─────────────────────────────────────
function joinTable(tableId) {
  playSound('join');
  state.tableId = tableId;
  state.socket.emit('joinTable', { tableId });
  showScreen('waiting-screen');
  document.getElementById('table-id-display').textContent = tableId;
}

// ── WAITING ROOM ───────────────────────────────────
function renderWaiting(ts) {
  const grid = document.getElementById('players-grid');
  const isHost = ts.hostId === state.player.id;

  document.getElementById('waiting-subtitle').textContent =
    isHost ? 'Вы — хозяин стола' : 'Ожидание начала игры...';

  const startBtn = document.getElementById('start-btn');
  startBtn.disabled = !isHost || ts.players.length < 2;
  if (!isHost) startBtn.style.display = 'none';
  else startBtn.style.display = '';

  // Fill slots
  const slots = [];
  ts.players.forEach(p => {
    slots.push(`
      <div class="player-slot filled ${p.id === ts.hostId ? 'host-slot':''}">
        <div class="player-avatar">${(p.avatar || p.name[0]).toString().slice(0,2)}</div>
        <div class="player-slot-name">${escHtml(p.name)}</div>
        ${p.id === ts.hostId ? '<div class="host-crown">👑 Хозяин</div>' : '<div class="host-crown" style="color:rgba(255,255,255,0.3)">Игрок</div>'}
      </div>
    `);
  });

  for (let i = ts.players.length; i < ts.maxPlayers; i++) {
    slots.push(`
      <div class="player-slot empty">
        <div class="empty-icon">👤</div>
        <div class="empty-text">Ожидание...</div>
      </div>
    `);
  }

  grid.innerHTML = slots.join('');

  const statusEl = document.getElementById('waiting-status');
  statusEl.textContent = ts.players.length >= 2
    ? (isHost ? `${ts.players.length}/${ts.maxPlayers} игроков — можно начинать!` : 'Ожидаем хозяина...')
    : `Нужно ещё ${2 - ts.players.length} игрока`;
}

function startGame() {
  state.socket.emit('startGame', { tableId: state.tableId });
}

function leaveTable() {
  state.socket.emit('leaveTable', { tableId: state.tableId });
  state.tableId = null;
  state.tableState = null;
  state.selectedTileIdx = null;
  showScreen('lobby-screen');
  refreshTables();
}

// ── GAME RENDERING ─────────────────────────────────
function renderGame(ts) {
  state.tableState = ts;
  state.isMyTurn = ts.currentPlayerId === state.player.id;

  // Top bar — scores
  const topbar = document.getElementById('game-topbar');
  topbar.innerHTML = ts.players.map(p => `
    <div class="score-chip ${p.id === ts.currentPlayerId ? 'active' : ''}">
      <div class="dot" style="background:${p.id === ts.currentPlayerId ? 'var(--gold)' : 'rgba(255,255,255,0.3)'}"></div>
      <span style="max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${escHtml(p.name)}</span>
      <span style="color:var(--gold-light)">${ts.scores[p.id] || 0}</span>
    </div>
  `).join('') + `<div class="boneyard-counter">🎴 ${ts.boneyardCount}</div>`;

  // Opponents area
  const oppsArea = document.getElementById('opponents-area');
  const opps = ts.players.filter(p => p.id !== state.player.id);
  oppsArea.innerHTML = opps.map(p => `
    <div class="opponent-card ${p.id === ts.currentPlayerId ? 'active' : ''}">
      <div class="opp-avatar">${(p.avatar||p.name[0]).toString().slice(0,2)}</div>
      <div class="opp-name">${escHtml(p.name)}</div>
      <div class="opp-tiles">${Array(Math.min(p.handCount,8)).fill(0).map(()=>'<div class="mini-tile"></div>').join('')}</div>
      <div class="opp-score">${ts.scores[p.id]||0} pts</div>
    </div>
  `).join('');

  // Board
  renderBoard(ts.board, ts.boardEnds);

  // My hand
  renderHand(ts.myHand, ts);

  // Action buttons
  const drawBtn = document.getElementById('draw-btn');
  const passBtn = document.getElementById('pass-btn');

  if (state.isMyTurn) {
    const canPlay = ts.myHand.some(t => canPlayTile(t, ts.boardEnds));
    drawBtn.disabled = !(!canPlay && ts.boneyardCount > 0) || !ts.boardEnds;
    passBtn.disabled = !(ts.boneyardCount === 0 && !canPlay);
    showTurnBanner(true);
    if (!document.getElementById('turn-banner').dataset.shown) {
      playSound('turn');
      vibrate(100);
    }
    document.getElementById('turn-banner').dataset.shown = '1';
  } else {
    drawBtn.disabled = true;
    passBtn.disabled = true;
    hideTurnBanner();
    document.getElementById('turn-banner').dataset.shown = '';
  }

  document.getElementById('my-count').textContent = ts.myHand.length;
}

function canPlayTile(tile, boardEnds) {
  if (!boardEnds) return true;
  return tile[0]===boardEnds.left || tile[1]===boardEnds.left ||
         tile[0]===boardEnds.right || tile[1]===boardEnds.right;
}

function renderBoard(board, boardEnds) {
  const container = document.getElementById('board-tiles');
  const endsEl = document.getElementById('board-ends');

  if (!board || board.length === 0) {
    container.innerHTML = '<div style="color:rgba(255,255,255,0.15);font-size:14px;padding:20px">Первый ход...</div>';
    endsEl.style.display = 'none';
    return;
  }

  container.innerHTML = '';
  board.forEach((entry, i) => {
    const isNew = i === board.length - 1;
    const [a, b] = entry.tile;
    const el = createTileEl(a, b, 'board', isNew);
    el.classList.add('board-tile');
    container.appendChild(el);
  });

  // Scroll to end
  setTimeout(() => container.scrollLeft = container.scrollWidth, 50);

  if (boardEnds) {
    endsEl.style.display = 'flex';
    document.getElementById('end-left').textContent = boardEnds.left;
    document.getElementById('end-right').textContent = boardEnds.right;
  }
}

function renderHand(hand, ts) {
  const container = document.getElementById('my-hand');
  container.innerHTML = '';

  hand.forEach((tile, idx) => {
    const isSelected = idx === state.selectedTileIdx;
    const isPlayable = state.isMyTurn && canPlayTile(tile, ts.boardEnds);
    const el = createTileEl(tile[0], tile[1], 'hand', false, isSelected, isPlayable);
    el.addEventListener('click', () => selectTile(idx, tile, ts));
    container.appendChild(el);
  });
}

function selectTile(idx, tile, ts) {
  if (!state.isMyTurn) {
    showToast('Сейчас не ваш ход!');
    playSound('error');
    return;
  }
  if (!canPlayTile(tile, ts.boardEnds)) {
    showToast('Эту кость нельзя поставить!');
    playSound('error');
    vibrate(30);
    return;
  }

  playSound('draw');
  state.selectedTileIdx = idx;
  renderHand(ts.myHand, ts);

  if (!ts.boardEnds) {
    // First tile — no side choice needed
    confirmPlay('right');
    return;
  }

  // Check if tile fits only one side
  const fitsLeft = tile[0] === ts.boardEnds.left || tile[1] === ts.boardEnds.left;
  const fitsRight = tile[0] === ts.boardEnds.right || tile[1] === ts.boardEnds.right;

  if (fitsLeft && !fitsRight) { confirmPlay('left'); return; }
  if (fitsRight && !fitsLeft) { confirmPlay('right'); return; }

  // Show side selection
  document.getElementById('left-end-label').textContent = `← ${ts.boardEnds.left}`;
  document.getElementById('right-end-label').textContent = `${ts.boardEnds.right} →`;
  document.getElementById('side-modal').classList.add('active');
}

function closeSideModal() {
  document.getElementById('side-modal').classList.remove('active');
  state.selectedTileIdx = null;
  if (state.tableState) renderHand(state.tableState.myHand, state.tableState);
}

function confirmPlay(side) {
  document.getElementById('side-modal').classList.remove('active');
  if (state.selectedTileIdx === null) return;

  state.socket.emit('playTile', {
    tableId: state.tableId,
    tileIdx: state.selectedTileIdx,
    side
  });
  state.selectedTileIdx = null;
}

function drawTile() {
  state.socket.emit('drawTile', { tableId: state.tableId });
}

function passTurn() {
  state.socket.emit('passTurn', { tableId: state.tableId });
}

function showTurnBanner(show) {
  const b = document.getElementById('turn-banner');
  b.style.display = show ? 'block' : 'none';
}
function hideTurnBanner() {
  document.getElementById('turn-banner').style.display = 'none';
}

// ── GAME OVER ──────────────────────────────────────
function showGameOver(winnerId, scores, reason) {
  const ts = state.tableState;
  const isWin = winnerId === state.player.id;
  const winnerName = ts?.players.find(p=>p.id===winnerId)?.name || 'Кто-то';

  document.getElementById('gameover-icon').textContent = isWin ? '🏆' : '😔';
  document.getElementById('gameover-title').textContent = isWin ? 'Победа!' : 'Игра окончена';
  document.getElementById('gameover-subtitle').textContent = isWin
    ? 'Вы выиграли этот раунд!'
    : (reason === 'blocked' ? 'Игра заблокирована' : `Победил ${winnerName}`);

  const scoresList = document.getElementById('gameover-scores');
  if (ts) {
    scoresList.innerHTML = ts.players
      .sort((a,b) => (ts.scores[b.id]||0) - (ts.scores[a.id]||0))
      .map(p => `
        <div class="score-row ${p.id===winnerId?'winner':''}">
          <div class="score-player">${p.id===winnerId?'🏆 ':''}${escHtml(p.name)}</div>
          <div class="score-pts">${ts.scores[p.id]||0} pts</div>
        </div>
      `).join('');
  }

  const playAgainBtn = document.getElementById('play-again-btn');
  if (ts?.hostId === state.player.id) {
    playAgainBtn.style.display = '';
  } else {
    playAgainBtn.style.display = 'none';
  }

  document.getElementById('gameover-modal').classList.add('active');
}

function playAgain() {
  document.getElementById('gameover-modal').classList.remove('active');
  state.socket.emit('playAgain', { tableId: state.tableId });
}

function goLobby() {
  document.getElementById('gameover-modal').classList.remove('active');
  leaveTable();
}

// ── BOOT ───────────────────────────────────────────
window.addEventListener('load', init);

// Auto-refresh lobby every 10s
setInterval(() => {
  if (document.getElementById('lobby-screen').classList.contains('active')) {
    refreshTables();
  }
}, 10000);
</script>
</body>
