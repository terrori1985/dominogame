<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎲 Domino</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root {
  --felt: #1a4a2e;
  --felt-light: #1e5535;
  --felt-dark: #122d1d;
  --gold: #d4a843;
  --gold-light: #f0c862;
  --gold-dark: #a07820;
  --tile-bg: #fdf8ee;
  --tile-border: #c8b88a;
  --tile-dot: #1a1a1a;
  --tile-shadow: rgba(0,0,0,0.4);
  --text-on-felt: #e8d9b0;
  --panel-bg: rgba(0,0,0,0.45);
  --panel-border: rgba(212,168,67,0.3);
  --accent: #e8a020;
  --danger: #e05050;
  --success: #50c878;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--felt-dark);
  color: var(--text-on-felt);
  user-select: none;
}

.screen { position: absolute; inset: 0; display: none; flex-direction: column; }
.screen.active { display: flex; }

#lobby-screen {
  background: linear-gradient(160deg, #0d2d1a 0%, #1a4a2e 50%, #0d2d1a 100%);
}

.lobby-header {
  padding: 20px 16px 12px;
  text-align: center;
  border-bottom: 1px solid var(--panel-border);
  background: var(--panel-bg);
}
.lobby-title {
  font-size: 28px;
  font-weight: 800;
  color: var(--gold-light);
  text-shadow: 0 0 20px rgba(240,200,98,0.4);
  letter-spacing: 2px;
}
.lobby-title span { font-size: 32px; }
.player-badge {
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: 8px; padding: 6px 14px;
  background: rgba(212,168,67,0.15);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  font-size: 14px; color: var(--gold);
}

.search-bar {
  display: flex; gap: 8px;
  padding: 12px 16px;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--panel-border);
}
.search-bar input {
  flex: 1;
  padding: 10px 14px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  color: #fff; font-size: 15px;
  outline: none;
}
.search-bar input::placeholder { color: rgba(255,255,255,0.35); }
.search-bar input:focus { border-color: var(--gold); }

.tables-list {
  flex: 1; overflow-y: auto;
  padding: 12px 16px;
}
.tables-list::-webkit-scrollbar { width: 4px; }
.tables-list::-webkit-scrollbar-track { background: transparent; }
.tables-list::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }

.table-card {
  display: flex; align-items: center;
  padding: 14px 16px; margin-bottom: 10px;
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.2s;
  animation: slideIn 0.3s ease;
}
.table-card:hover { border-color: var(--gold); background: rgba(0,0,0,0.6); transform: translateY(-1px); }
.table-card:active { transform: scale(0.98); }
.table-icon {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--felt), var(--felt-light));
  border: 2px solid var(--gold-dark);
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin-right: 12px; flex-shrink: 0;
}
.table-info { flex: 1; }
.table-name { font-weight: 700; font-size: 16px; color: var(--gold-light); }
.table-meta { font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 3px; }
.table-players {
  display: flex; align-items: center; gap: 4px;
  font-size: 14px; font-weight: 600;
  color: var(--gold);
}
.table-status {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 8px var(--success);
  margin-left: 4px;
}
.no-tables {
  text-align: center; padding: 40px 20px;
  color: rgba(255,255,255,0.3); font-size: 15px;
}
.no-tables div { font-size: 40px; margin-bottom: 12px; }

.lobby-footer {
  padding: 12px 16px 24px;
  display: flex; gap: 10px;
  background: var(--panel-bg);
  border-top: 1px solid var(--panel-border);
}
.btn {
  flex: 1; padding: 14px;
  border: none; border-radius: var(--radius);
  font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
  letter-spacing: 0.5px;
}
.btn:active { transform: scale(0.96); }
.btn-primary {
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  color: #1a1a1a;
  box-shadow: 0 4px 15px rgba(212,168,67,0.3);
}
.btn-primary:hover { box-shadow: 0 6px 20px rgba(212,168,67,0.45); }
.btn-secondary {
  background: rgba(255,255,255,0.08);
  color: var(--text-on-felt);
  border: 1px solid var(--panel-border);
}

#waiting-screen {
  background: linear-gradient(160deg, #0d2d1a 0%, #1a4a2e 50%, #0d2d1a 100%);
}
.waiting-header {
  padding: 20px 16px 16px;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--panel-border);
  display: flex; align-items: center; gap: 12px;
}
.back-btn {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.1);
  border: 1px solid var(--panel-border);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px;
  transition: all 0.2s;
}
.back-btn:active { transform: scale(0.9); }
.waiting-title { flex: 1; }
.waiting-title h2 { font-size: 20px; font-weight: 700; color: var(--gold-light); }
.waiting-title p { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 2px; }
.table-id-badge {
  padding: 6px 12px;
  background: rgba(212,168,67,0.15);
  border: 1px solid var(--panel-border);
  border-radius: 8px;
  font-size: 13px; font-weight: 700;
  color: var(--gold); letter-spacing: 1px;
}
.players-grid {
  flex: 1; padding: 20px 16px;
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; align-content: start;
}
.player-slot {
  padding: 16px; border-radius: var(--radius);
  border: 1px solid var(--panel-border);
  text-align: center; min-height: 90px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; animation: fadeIn 0.3s ease;
}
.player-slot.filled {
  background: var(--panel-bg);
  border-color: var(--gold-dark);
}
.player-slot.empty {
  background: rgba(255,255,255,0.03);
  border-style: dashed;
}
.player-slot.host-slot { border-color: var(--gold); }
.player-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: #1a1a1a;
}
.player-slot-name { font-size: 14px; font-weight: 600; color: var(--text-on-felt); }
.host-crown { font-size: 12px; color: var(--gold); }
.empty-icon { font-size: 28px; color: rgba(255,255,255,0.15); }
.empty-text { font-size: 13px; color: rgba(255,255,255,0.25); }

#game-screen {
  background: radial-gradient(ellipse at center, var(--felt) 0%, var(--felt-dark) 100%);
  overflow: hidden;
}

.game-topbar {
  display: flex; align-items: center;
  padding: 8px 12px; gap: 8px;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--panel-border);
  z-index: 10;
  flex-wrap: wrap;
}
.score-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  background: rgba(212,168,67,0.12);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  font-size: 13px; font-weight: 700;
  white-space: nowrap;
}
.score-chip .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold);
}
.score-chip.active { border-color: var(--gold); background: rgba(212,168,67,0.2); }
.boneyard-counter {
  margin-left: auto;
  padding: 5px 12px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  font-size: 13px; color: rgba(255,255,255,0.7);
}

.board-area {
  flex: 1; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.board-table {
  position: absolute;
  width: calc(100% - 24px); height: calc(100% - 16px);
  border-radius: 24px;
  background: radial-gradient(ellipse at center, #1e5535 0%, #1a4a2e 60%, #122d1d 100%);
  border: 3px solid var(--gold-dark);
  box-shadow: inset 0 0 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(212,168,67,0.1);
  overflow: hidden;
}
.board-felt-pattern {
  position: absolute; inset: 0; opacity: 0.04;
  background-image: repeating-linear-gradient(45deg, #fff 0px, #fff 1px, transparent 1px, transparent 8px),
                    repeating-linear-gradient(-45deg, #fff 0px, #fff 1px, transparent 1px, transparent 8px);
}
.board-tiles {
  position: relative; z-index: 2;
  display: flex; align-items: center;
  padding: 8px; gap: 3px;
  max-width: 100%; overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.board-tiles::-webkit-scrollbar { display: none; }

.board-ends {
  position: absolute; bottom: 8px;
  display: flex; gap: 16px;
  z-index: 3; width: 100%; justify-content: center;
}
.end-badge {
  padding: 4px 12px;
  background: rgba(0,0,0,0.5);
  border: 1px solid var(--panel-border);
  border-radius: 12px;
  font-size: 13px; font-weight: 700; color: var(--gold);
}

.opponents-area {
  display: flex; justify-content: space-around;
  padding: 8px 12px;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--panel-border);
  flex-wrap: wrap;
}
.opponent-card {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; padding: 6px 10px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  transition: all 0.3s; min-width: 70px;
}
.opponent-card.active {
  border-color: var(--gold);
  background: rgba(212,168,67,0.1);
  animation: pulseGold 1.5s infinite;
}
.opp-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, #2a5a3e, #3a7a5e);
  border: 2px solid transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--gold-light);
  transition: border-color 0.3s;
}
.opponent-card.active .opp-avatar { border-color: var(--gold); }
.opp-name { font-size: 11px; color: rgba(255,255,255,0.6); max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.opp-tiles {
  display: flex; gap: 2px;
}
.mini-tile {
  width: 8px; height: 14px;
  background: var(--tile-bg);
  border-radius: 2px;
  border: 1px solid var(--tile-border);
}
.opp-score { font-size: 12px; font-weight: 700; color: var(--gold); }

.my-hand-area {
  background: var(--panel-bg);
  border-top: 1px solid var(--panel-border);
  padding: 10px 0 16px;
}
.hand-label {
  text-align: center; font-size: 11px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase;
}
.hand-tiles {
  display: flex; justify-content: center;
  gap: 6px; padding: 0 12px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.hand-tiles::-webkit-scrollbar { display: none; }

.action-bar {
  display: flex; gap: 8px;
  padding: 8px 12px;
  background: var(--panel-bg);
  border-top: 1px solid var(--panel-border);
}
.action-btn {
  flex: 1; padding: 11px 8px;
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  background: rgba(255,255,255,0.07);
  color: var(--text-on-felt);
  font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.action-btn:active { transform: scale(0.95); }
.action-btn.draw { border-color: var(--accent); color: var(--accent); }
.action-btn.draw:hover { background: rgba(232,160,32,0.15); }
.action-btn.pass { border-color: rgba(255,255,255,0.3); }
.action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.domino-tile {
  position: relative;
  display: inline-flex; flex-direction: column;
  background: var(--tile-bg);
  border: 2px solid var(--tile-border);
  border-radius: 7px;
  box-shadow: 2px 3px 8px var(--tile-shadow), inset 0 1px 0 rgba(255,255,255,0.8);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  flex-shrink: 0;
  overflow: hidden;
}
.domino-tile:hover { transform: translateY(-4px) scale(1.05); box-shadow: 3px 8px 16px var(--tile-shadow); }
.domino-tile:active { transform: scale(0.95); }
.domino-tile.selected {
  border-color: var(--gold);
  transform: translateY(-8px);
  box-shadow: 0 10px 24px rgba(212,168,67,0.5);
}
.domino-tile.playable {
  border-color: var(--success);
  animation: glowGreen 1.5s infinite;
}
.domino-tile.board-tile {
  cursor: default;
  transform: none !important;
}
.domino-tile.board-tile:hover { transform: none; box-shadow: 2px 3px 8px var(--tile-shadow); }
.domino-tile.horizontal { flex-direction: row; }

.tile-hand { width: 36px; height: 64px; }
.tile-hand .tile-half { width: 36px; height: 32px; }
.tile-board { width: 30px; height: 52px; }
.tile-board .tile-half { width: 30px; height: 26px; }
.tile-board.horizontal { width: 52px; height: 30px; }
.tile-board.horizontal .tile-half { width: 26px; height: 30px; }

.tile-half {
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.tile-divider-h {
  width: calc(100% - 8px); height: 1px;
  background: rgba(0,0,0,0.18); margin: 0 4px;
}
.tile-divider-v {
  width: 1px; height: calc(100% - 8px);
  background: rgba(0,0,0,0.18); margin: 4px 0;
}

.dots {
  display: grid;
  width: 100%; height: 100%;
  padding: 4px;
}
.d1 { grid-template: 1fr / 1fr; }
.d2h { grid-template: 1fr 1fr / 1fr; }
.d2 { grid-template: 1fr / 1fr 1fr; }
.d3 { grid-template: 1fr 1fr 1fr / 1fr; }
.d4 { grid-template: 1fr 1fr / 1fr 1fr; }
.d5 { grid-template: 1fr 1fr 1fr / 1fr 1fr; }
.d6 { grid-template: 1fr 1fr 1fr / 1fr 1fr; }

.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--tile-dot);
  place-self: center;
  box-shadow: inset 1px 1px 2px rgba(255,255,255,0.1);
}
.tile-hand .dot { width: 7px; height: 7px; }
.tile-board .dot { width: 5px; height: 5px; }

.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  display: none; align-items: flex-end; justify-content: center;
  background: rgba(0,0,0,0.7);
}
.modal-overlay.active { display: flex; }
.modal-sheet {
  width: 100%; max-width: 480px;
  background: #0d2d1a;
  border-top: 2px solid var(--gold-dark);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px 36px;
  animation: slideUp 0.3s ease;
}
.modal-handle {
  width: 40px; height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  margin: -8px auto 16px;
}
.modal-title {
  font-size: 22px; font-weight: 800;
  text-align: center; color: var(--gold-light);
  margin-bottom: 8px;
}
.modal-subtitle {
  font-size: 14px; text-align: center;
  color: rgba(255,255,255,0.55);
  margin-bottom: 20px;
}
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; color: rgba(255,255,255,0.55); margin-bottom: 6px; }
.form-input {
  width: 100%; padding: 12px 14px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  color: #fff; font-size: 15px; outline: none;
}
.form-input:focus { border-color: var(--gold); }
.form-select {
  width: 100%; padding: 12px 14px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  color: #fff; font-size: 15px; outline: none;
  -webkit-appearance: none;
}
.form-select option { background: #1a4a2e; }
.modal-btns { display: flex; gap: 10px; margin-top: 20px; }

.gameover-modal {
  position: fixed; inset: 0; z-index: 200;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.8);
}
.gameover-modal.active { display: flex; }
.gameover-card {
  background: linear-gradient(160deg, #0d2d1a, #1a4a2e);
  border: 2px solid var(--gold);
  border-radius: 20px;
  padding: 32px 24px;
  width: calc(100% - 32px); max-width: 360px;
  text-align: center;
  animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.gameover-icon { font-size: 64px; margin-bottom: 12px; }
.gameover-title { font-size: 32px; font-weight: 900; color: var(--gold-light); margin-bottom: 4px; }
.gameover-subtitle { font-size: 16px; color: rgba(255,255,255,0.6); margin-bottom: 24px; }
.scores-list { margin-bottom: 24px; }
.score-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; margin-bottom: 8px;
  background: rgba(0,0,0,0.35);
  border-radius: var(--radius);
  border: 1px solid var(--panel-border);
}
.score-row.winner { border-color: var(--gold); background: rgba(212,168,67,0.12); }
.score-player { font-size: 15px; font-weight: 600; }
.score-pts { font-size: 18px; font-weight: 800; color: var(--gold); }

.toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
  padding: 10px 20px;
  background: rgba(0,0,0,0.85);
  border: 1px solid var(--panel-border);
  border-radius: 20px;
  font-size: 14px; color: #fff;
  z-index: 300;
  opacity: 0; transition: all 0.25s;
  pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.turn-banner {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  padding: 6px 16px;
  background: rgba(212,168,67,0.9);
  border-radius: 20px;
  font-size: 14px; font-weight: 700; color: #1a1a1a;
  z-index: 5;
  animation: bounceIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.side-modal {
  position: fixed; inset: 0; z-index: 150;
  display: none; align-items: flex-end; justify-content: center;
  background: rgba(0,0,0,0.6);
}
.side-modal.active { display: flex; }
.side-sheet {
  width: 100%; max-width: 480px;
  background: #0d2d1a;
  border-top: 2px solid var(--gold-dark);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px 40px;
  animation: slideUp 0.3s ease;
}
.side-options {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-top: 16px;
}
.side-btn {
  padding: 20px 12px;
  background: rgba(255,255,255,0.07);
  border: 2px solid var(--panel-border);
  border-radius: var(--radius);
  color: var(--text-on-felt);
  font-size: 16px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  text-align: center;
}
.side-btn:hover { border-color: var(--gold); background: rgba(212,168,67,0.15); }
.side-btn:active { transform: scale(0.95); }
.side-btn .side-icon { font-size: 28px; margin-bottom: 6px; display: block; }
.side-cancel {
  width: 100%; margin-top: 12px;
  padding: 14px;
  background: transparent;
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  color: rgba(255,255,255,0.5);
  font-size: 15px; cursor: pointer;
}

.counters-bar {
  display: flex; justify-content: space-around;
  padding: 6px 12px;
  background: rgba(0,0,0,0.35);
  border-bottom: 1px solid var(--panel-border);
}
.counter-item {
  text-align: center; flex: 1;
}
.counter-value {
  font-size: 22px; font-weight: 900;
  color: var(--gold-light);
  line-height: 1;
}
.counter-label {
  font-size: 10px; color: rgba(255,255,255,0.4);
  letter-spacing: 0.5px; margin-top: 2px;
}
.counter-item.highlight .counter-value { color: var(--success); }
.counter-divider { width: 1px; background: var(--panel-border); margin: 4px 0; }

.loader {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%;
  gap: 16px;
}
.loader-spin {
  width: 48px; height: 48px;
  border: 3px solid rgba(212,168,67,0.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loader-text { font-size: 16px; color: rgba(255,255,255,0.5); }

@keyframes slideIn { from { opacity:0; transform: translateX(-20px); } to { opacity:1; transform: translateX(0); } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes fadeIn { from { opacity:0; transform: scale(0.9); } to { opacity:1; transform: scale(1); } }
@keyframes popIn { from { opacity:0; transform: scale(0.7); } to { opacity:1; transform: scale(1); } }
@keyframes bounceIn { from { opacity:0; transform: translateX(-50%) scale(0.8); } to { opacity:1; transform: translateX(-50%) scale(1); } }
@keyframes tilePlace { 0% { transform: scale(0) rotate(180deg); opacity:0; } 60% { transform: scale(1.15) rotate(-5deg); } 100% { transform: scale(1) rotate(0deg); opacity:1; } }
@keyframes pulseGold { 0%,100% { box-shadow: 0 0 0 0 rgba(212,168,67,0.4); } 50% { box-shadow: 0 0 0 6px rgba(212,168,67,0); } }
@keyframes glowGreen { 0%,100% { box-shadow: 0 0 0 0 rgba(80,200,120,0.5); } 50% { box-shadow: 0 0 8px 3px rgba(80,200,120,0.3); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
.tile-new { animation: tilePlace 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
.confetti-piece {
  position: fixed; width: 10px; height: 10px; z-index: 250;
  animation: confettiFall 2s ease-in forwards;
  pointer-events: none;
}
</style>
</head>
<body>

<div class="screen active" id="lobby-screen">
  <div class="lobby-header">
    <div class="lobby-title"><span>🎲</span> DOMINO</div>
    <div class="player-badge">
      <span id="lobby-avatar"></span>
      <span id="lobby-name">Загрузка...</span>
    </div>
  </div>

  <div class="search-bar">
    <input type="search" id="search-input" placeholder="🔍 Поиск стола..." oninput="filterTables()">
    <button class="btn btn-secondary" style="flex:0;width:44px;font-size:18px" onclick="refreshTables()">↻</button>
  </div>

  <div class="counters-bar">
    <div class="counter-item">
      <div class="counter-value" id="cnt-tables">0</div>
      <div class="counter-label">СТОЛОВ</div>
    </div>
    <div class="counter-divider"></div>
    <div class="counter-item highlight">
      <div class="counter-value" id="cnt-players">0</div>
      <div class="counter-label">ИГРОКОВ</div>
    </div>
    <div class="counter-divider"></div>
    <div class="counter-item">
      <div class="counter-value" id="cnt-games">0</div>
      <div class="counter-label">ИГР СЫГРАНО</div>
    </div>
  </div>

  <div class="tables-list" id="tables-list">
    <div class="loader">
      <div class="loader-spin"></div>
      <div class="loader-text">Поиск столов...</div>
    </div>
  </div>

  <div class="lobby-footer">
    <button class="btn btn-secondary" onclick="showCreateModal()">+ Создать стол</button>
    <button class="btn btn-primary" onclick="quickJoin()">⚡ Быстрая игра</button>
  </div>
</div>

<div class="screen" id="waiting-screen">
  <div class="waiting-header">
    <div class="back-btn" onclick="leaveTable()">←</div>
    <div class="waiting-title">
      <h2>Зал ожидания</h2>
      <p id="waiting-subtitle">Ожидание игроков...</p>
    </div>
    <div class="table-id-badge" id="table-id-display">—</div>
  </div>
  <div class="players-grid" id="players-grid"></div>
  <div class="lobby-footer" style="flex-direction:column;gap:8px">
    <div class="waiting-status" id="waiting-status">Нужно минимум 2 игрока</div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-secondary" onclick="leaveTable()">Покинуть</button>
      <button class="btn btn-primary" id="start-btn" onclick="startGame()" disabled>Начать игру</button>
    </div>
  </div>
</div>

<div class="screen" id="game-screen">
  <div class="game-topbar" id="game-topbar"></div>
  <div class="opponents-area" id="opponents-area"></div>
  <div class="board-area">
    <div class="board-table">
      <div class="board-felt-pattern"></div>
      <div class="board-tiles" id="board-tiles">
        <div style="color:rgba(255,255,255,0.15);font-size:14px;padding:20px">Первый ход...</div>
      </div>
      <div class="board-ends" id="board-ends" style="display:none">
        <div class="end-badge">← <span id="end-left">—</span></div>
        <div class="end-badge"><span id="end-right">—</span> →</div>
      </div>
    </div>
    <div id="turn-banner" style="display:none" class="turn-banner">Ваш ход!</div>
  </div>
  <div class="my-hand-area">
    <div class="hand-label">МОИ КОСТИ (<span id="my-count">0</span>)</div>
    <div class="hand-tiles" id="my-hand"></div>
  </div>
  <div class="action-bar">
    <button class="action-btn draw" id="draw-btn" onclick="drawTile()" disabled>🎴 Взять кость</button>
    <button class="action-btn pass" id="pass-btn" onclick="passTurn()" disabled>⏭ Пас</button>
    <button class="action-btn" onclick="leaveTable()" style="flex:0;padding:11px 14px">🚪</button>
  </div>
</div>

<div class="modal-overlay" id="create-modal" onclick="closeModal('create-modal')">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">🎲 Новый стол</div>
    <div class="modal-subtitle">Настройте параметры игры</div>
    <div class="form-group">
      <label>Максимум игроков</label>
      <select class="form-select" id="max-players">
        <option value="2">2 игрока</option>
        <option value="3">3 игрока</option>
        <option value="4" selected>4 игрока</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal('create-modal')">Отмена</button>
      <button class="btn btn-primary" onclick="createTable()">Создать</button>
    </div>
  </div>
</div>

<div class="side-modal" id="side-modal">
  <div class="side-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" style="margin-bottom:4px">Куда положить?</div>
    <div class="modal-subtitle">Выберите конец цепочки</div>
    <div class="side-options">
      <button class="side-btn" onclick="confirmPlay('left')"><span class="side-icon">⬅️</span>Левый конец<br><small style="color:rgba(255,255,255,0.4);font-size:12px" id="left-end-label"></small></button>
      <button class="side-btn" onclick="confirmPlay('right')"><span class="side-icon">➡️</span>Правый конец<br><small style="color:rgba(255,255,255,0.4);font-size:12px" id="right-end-label"></small></button>
    </div>
    <button class="side-cancel" onclick="closeSideModal()">Отмена</button>
  </div>
</div>

<div class="gameover-modal" id="gameover-modal">
  <div class="gameover-card">
    <div class="gameover-icon" id="gameover-icon">🏆</div>
    <div class="gameover-title" id="gameover-title">Победа!</div>
    <div class="gameover-subtitle" id="gameover-subtitle">Отличная игра!</div>
    <div class="scores-list" id="gameover-scores"></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-secondary" onclick="goLobby()" style="flex:1">Лобби</button>
      <button class="btn btn-primary" id="play-again-btn" onclick="playAgain()" style="flex:1">Ещё раз</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const state = {
  socket: null,
  player: { id: null, name: 'Игрок', avatar: '🎲', telegramId: null },
  tableId: null,
  tableState: null,
  selectedTileIdx: null,
  allTables: [],
  gamesPlayed: 0,
  isMyTurn: false,
  isConnected: false
};

function showToast(msg, duration=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function vibrate(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); }

function escHtml(s) { 
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); 
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

const DOT_LAYOUTS = {0:[],1:[[1,1]],2:[[0,0],[2,2]],3:[[0,0],[1,1],[2,2]],4:[[0,0],[0,2],[2,0],[2,2]],5:[[0,0],[0,2],[1,1],[2,0],[2,2]],6:[[0,0],[0,2],[1,0],[1,2],[2,0],[2,2]]};

function renderDots(n) {
  const layout = DOT_LAYOUTS[n] || [];
  const grid = document.createElement('div');
  if (n===0) { grid.style.cssText='width:100%;height:100%'; return grid; }
  grid.style.cssText='display:grid;grid-template-rows:1fr 1fr 1fr;grid-template-columns:1fr 1fr 1fr;width:100%;height:100%;padding:3px;gap:1px;';
  for (let r=0;r<3;r++) {
    for (let c=0;c<3;c++) {
      const cell=document.createElement('div');
      cell.style.cssText='display:flex;align-items:center;justify-content:center;';
      if (layout.some(([rr,cc])=>rr===r&&cc===c)) {
        const dot=document.createElement('div');
        dot.className='dot';
        cell.appendChild(dot);
      }
      grid.appendChild(cell);
    }
  }
  return grid;
}

function createTileEl(a, b, size='hand', isNew=false, isSelected=false, isPlayable=false) {
  const tile=document.createElement('div');
  const isHoriz=size==='board';
  tile.className=`domino-tile tile-${size}${isHoriz?' horizontal':''}${isNew?' tile-new':''}${isSelected?' selected':''}${isPlayable?' playable':''}`;
  const topHalf=document.createElement('div'); topHalf.className='tile-half'; topHalf.appendChild(renderDots(a));
  const div=document.createElement('div'); div.className=isHoriz?'tile-divider-v':'tile-divider-h';
  const botHalf=document.createElement('div'); botHalf.className='tile-half'; botHalf.appendChild(renderDots(b));
  tile.appendChild(topHalf); tile.appendChild(div); tile.appendChild(botHalf);
  return tile;
}

// ГЛАВНОЕ - ПОДКЛЮЧЕНИЕ WEBSOCKET
function connectSocket() {
  // Используем тот же хост, что и страница
  const socketUrl = window.location.origin;
  
  console.log('Connecting to Socket.IO at:', socketUrl);
  
  const socket = io(socketUrl, {
    transports: ['websocket', 'polling'],
    reconnection: true,
    reconnectionAttempts: 10,
    reconnectionDelay: 1000,
    reconnectionDelayMax: 5000,
    timeout: 20000
  });
  
  state.socket = socket;

  socket.on('connect', () => {
    state.isConnected = true;
    console.log('✅ Socket connected! ID:', socket.id);
    showToast('✅ Подключено к серверу');
    
    socket.emit('register', { 
      name: state.player.name, 
      avatar: state.player.avatar, 
      telegramId: state.player.telegramId 
    });
    
    refreshTables();
  });

  socket.on('connect_error', (err) => {
    console.error('❌ Connection error:', err.message);
    showToast('⚠️ Ошибка подключения: ' + err.message);
  });

  socket.on('disconnect', (reason) => {
    console.log('Disconnected:', reason);
    state.isConnected = false;
    showToast('⚠️ Соединение потеряно, переподключение...');
  });

  socket.on('registered', ({ id }) => { 
    state.player.id = id;
    console.log('Registered with ID:', id);
  });

  socket.on('tablesList', (tables) => {
    state.allTables = tables;
    renderTables(tables);
    updateCounters();
    console.log('Tables received:', tables.length);
  });

  socket.on('tablesUpdate', (tables) => {
    state.allTables = tables;
    renderTables(tables);
    updateCounters();
  });

  socket.on('tableCreated', ({ tableId }) => {
    state.tableId = tableId;
    showScreen('waiting-screen');
    document.getElementById('table-id-display').textContent = tableId;
    console.log('Table created:', tableId);
  });

  socket.on('tableState', (ts) => {
    state.tableState = ts;
    if (ts.status === 'waiting') renderWaiting(ts);
    else if (ts.status === 'playing') renderGame(ts);
  });

  socket.on('playerJoined', ({ player }) => {
    showToast(`${player.name} присоединился!`);
    vibrate(50);
  });

  socket.on('gameStarted', (ts) => {
    state.tableState = ts;
    showScreen('game-screen');
    renderGame(ts);
    vibrate([50,30,50]);
    showToast('🎲 Игра началась!');
  });

  socket.on('tilePlayed', ({ playerName }) => { vibrate(30); });
  socket.on('tileDrawn', ({ tile }) => { showToast(`Взята кость [${tile[0]}|${tile[1]}]`); });
  socket.on('playerLeft', () => { showToast('Игрок покинул стол'); });

  socket.on('gameOver', ({ winner, scores, reason }) => {
    state.gamesPlayed++;
    const isWin = winner === state.player.id;
    if (isWin) { 
      showToast('🏆 ПОБЕДА! 🏆');
      vibrate([100,50,100,50,200]); 
    } else { 
      vibrate([200]); 
    }
    showGameOver(winner, scores, reason);
  });

  socket.on('error', (msg) => { 
    showToast('⚠️ ' + msg); 
    vibrate([50,50,50]);
  });

  return socket;
}

function refreshTables() { if (state.socket && state.isConnected) state.socket.emit('getTables'); }

function filterTables() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = state.allTables.filter(t => t.hostName.toLowerCase().includes(q) || t.id.toLowerCase().includes(q));
  renderTables(filtered);
}

function renderTables(tables) {
  const list = document.getElementById('tables-list');
  if (!tables || tables.length === 0) {
    list.innerHTML = `<div class="no-tables"><div>🎲</div>Активных столов нет.<br>Создайте свой или подождите.</div>`;
    return;
  }
  list.innerHTML = tables.map(t => `<div class="table-card" onclick="joinTable('${t.id}')"><div class="table-icon">🎲</div><div class="table-info"><div class="table-name">${escHtml(t.hostName)}'s стол</div><div class="table-meta">ID: ${t.id}</div></div><div><div class="table-players">${t.playerCount}/${t.maxPlayers}<div class="table-status"></div></div></div></div>`).join('');
}

function updateCounters() {
  document.getElementById('cnt-tables').textContent = state.allTables.length;
  const totalPlayers = state.allTables.reduce((s,t)=>s + (t.playerCount || 0),0);
  document.getElementById('cnt-players').textContent = totalPlayers;
  document.getElementById('cnt-games').textContent = state.gamesPlayed;
}

function quickJoin() {
  const available = state.allTables.filter(t => t.playerCount < t.maxPlayers);
  if (available.length) joinTable(available[0].id);
  else showCreateModal();
}

function showCreateModal() { document.getElementById('create-modal').classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function createTable() {
  const maxPlayers = parseInt(document.getElementById('max-players').value);
  if (state.socket && state.isConnected) {
    state.socket.emit('createTable', { maxPlayers, isPrivate: false });
    closeModal('create-modal');
  } else {
    showToast('Нет соединения с сервером');
  }
}

function joinTable(tableId) {
  if (state.socket && state.isConnected) {
    state.tableId = tableId;
    state.socket.emit('joinTable', { tableId });
    showScreen('waiting-screen');
    document.getElementById('table-id-display').textContent = tableId;
  } else {
    showToast('Нет соединения с сервером');
  }
}

function renderWaiting(ts) {
  const grid = document.getElementById('players-grid');
  const isHost = ts.hostId === state.player.id;
  document.getElementById('waiting-subtitle').textContent = isHost ? 'Вы — хозяин стола' : 'Ожидание начала игры...';
  const startBtn = document.getElementById('start-btn');
  startBtn.disabled = !isHost || ts.players.length < 2;
  if (!isHost) startBtn.style.display = 'none';
  else startBtn.style.display = '';
  
  const slots = ts.players.map(p => `<div class="player-slot filled ${p.id===ts.hostId?'host-slot':''}"><div class="player-avatar">${(p.avatar||p.name[0]).toString().slice(0,2)}</div><div class="player-slot-name">${escHtml(p.name)}</div>${p.id===ts.hostId?'<div class="host-crown">👑 Хозяин</div>':'<div class="host-crown" style="color:rgba(255,255,255,0.3)">Игрок</div>'}</div>`);
  for (let i=ts.players.length;i<ts.maxPlayers;i++) slots.push(`<div class="player-slot empty"><div class="empty-icon">👤</div><div class="empty-text">Ожидание...</div></div>`);
  grid.innerHTML = slots.join('');
  document.getElementById('waiting-status').textContent = ts.players.length>=2 ? (isHost?`${ts.players.length}/${ts.maxPlayers} игроков — можно начинать!`:'Ожидаем хозяина...') : `Нужно ещё ${2-ts.players.length} игрока`;
}

function startGame() { if (state.socket) state.socket.emit('startGame', { tableId: state.tableId }); }

function leaveTable() {
  if (state.socket) state.socket.emit('leaveTable', { tableId: state.tableId });
  state.tableId = null; state.tableState = null; state.selectedTileIdx = null;
  showScreen('lobby-screen');
  refreshTables();
}

function canPlayTile(tile, boardEnds) {
  if (!boardEnds) return true;
  return tile[0]===boardEnds.left || tile[1]===boardEnds.left || tile[0]===boardEnds.right || tile[1]===boardEnds.right;
}

function renderGame(ts) {
  state.tableState = ts;
  state.isMyTurn = ts.currentPlayerId === state.player.id;
  
  const topbar = document.getElementById('game-topbar');
  topbar.innerHTML = ts.players.map(p => `<div class="score-chip ${p.id===ts.currentPlayerId?'active':''}"><div class="dot"></div><span style="max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${escHtml(p.name)}</span><span style="color:var(--gold-light)">${ts.scores[p.id]||0}</span></div>`).join('') + `<div class="boneyard-counter">🎴 ${ts.boneyardCount}</div>`;
  
  const oppsArea = document.getElementById('opponents-area');
  const opps = ts.players.filter(p=>p.id!==state.player.id);
  oppsArea.innerHTML = opps.map(p=>`<div class="opponent-card ${p.id===ts.currentPlayerId?'active':''}"><div class="opp-avatar">${(p.avatar||p.name[0]).toString().slice(0,2)}</div><div class="opp-name">${escHtml(p.name)}</div><div class="opp-tiles">${Array(Math.min(p.handCount,8)).fill(0).map(()=>'<div class="mini-tile"></div>').join('')}</div><div class="opp-score">${ts.scores[p.id]||0} pts</div></div>`).join('');
  
  renderBoard(ts.board, ts.boardEnds);
  renderHand(ts.myHand, ts);
  
  const drawBtn = document.getElementById('draw-btn');
  const passBtn = document.getElementById('pass-btn');
  if (state.isMyTurn) {
    const canPlay = ts.myHand.some(t=>canPlayTile(t,ts.boardEnds));
    drawBtn.disabled = !(!canPlay && ts.boneyardCount>0) || !ts.boardEnds;
    passBtn.disabled = !(ts.boneyardCount===0 && !canPlay);
    document.getElementById('turn-banner').style.display = 'block';
  } else {
    drawBtn.disabled = true; passBtn.disabled = true;
    document.getElementById('turn-banner').style.display = 'none';
  }
  document.getElementById('my-count').textContent = ts.myHand.length;
}

function renderBoard(board, boardEnds) {
  const container = document.getElementById('board-tiles');
  const endsEl = document.getElementById('board-ends');
  if (!board || board.length===0) {
    container.innerHTML = '<div style="color:rgba(255,255,255,0.15);font-size:14px;padding:20px">Первый ход...</div>';
    endsEl.style.display = 'none';
    return;
  }
  container.innerHTML = '';
  board.forEach((entry,i)=>{ const isNew=i===board.length-1; const [a,b]=entry.tile; const el=createTileEl(a,b,'board',isNew); el.classList.add('board-tile'); container.appendChild(el); });
  setTimeout(()=>container.scrollLeft=container.scrollWidth,50);
  if (boardEnds) { endsEl.style.display='flex'; document.getElementById('end-left').textContent=boardEnds.left; document.getElementById('end-right').textContent=boardEnds.right; }
}

function renderHand(hand, ts) {
  const container = document.getElementById('my-hand');
  container.innerHTML = '';
  hand.forEach((tile,idx)=>{ 
    const isSelected=idx===state.selectedTileIdx; 
    const isPlayable=state.isMyTurn && canPlayTile(tile,ts.boardEnds); 
    const el=createTileEl(tile[0],tile[1],'hand',false,isSelected,isPlayable); 
    el.addEventListener('click',()=>selectTile(idx,tile,ts)); 
    container.appendChild(el); 
  });
}

function selectTile(idx, tile, ts) {
  if (!state.isMyTurn) { showToast('Сейчас не ваш ход!'); return; }
  if (!canPlayTile(tile, ts.boardEnds)) { showToast('Эту кость нельзя поставить!'); vibrate(30); return; }
  state.selectedTileIdx = idx;
  renderHand(ts.myHand, ts);
  if (!ts.boardEnds) { confirmPlay('right'); return; }
  const fitsLeft = tile[0]===ts.boardEnds.left || tile[1]===ts.boardEnds.left;
  const fitsRight = tile[0]===ts.boardEnds.right || tile[1]===ts.boardEnds.right;
  if (fitsLeft && !fitsRight) { confirmPlay('left'); return; }
  if (fitsRight && !fitsLeft) { confirmPlay('right'); return; }
  document.getElementById('left-end-label').textContent = `← ${ts.boardEnds.left}`;
  document.getElementById('right-end-label').textContent = `${ts.boardEnds.right} →`;
  document.getElementById('side-modal').classList.add('active');
}

function closeSideModal() {
  document.getElementById('side-modal').classList.remove('active');
  state.selectedTileIdx = null;
  if (state.tableState) renderHand(state.tableState.myHand, state.tableState);
}

function confirmPlay(side) {
  document.getElementById('side-modal').classList.remove('active');
  if (state.selectedTileIdx===null) return;
  state.socket.emit('playTile', { tableId: state.tableId, tileIdx: state.selectedTileIdx, side });
  state.selectedTileIdx = null;
}

function drawTile() { if (state.socket) state.socket.emit('drawTile', { tableId: state.tableId }); }
function passTurn() { if (state.socket) state.socket.emit('passTurn', { tableId: state.tableId }); }

function showGameOver(winnerId, scores, reason) {
  const ts = state.tableState;
  const isWin = winnerId === state.player.id;
  const winnerName = ts?.players.find(p=>p.id===winnerId)?.name || 'Кто-то';
  document.getElementById('gameover-icon').textContent = isWin ? '🏆' : '😔';
  document.getElementById('gameover-title').textContent = isWin ? 'Победа!' : 'Игра окончена';
  document.getElementById('gameover-subtitle').textContent = isWin ? 'Вы выиграли этот раунд!' : (reason==='blocked' ? 'Игра заблокирована' : `Победил ${winnerName}`);
  const scoresList = document.getElementById('gameover-scores');
  if (ts) {
    scoresList.innerHTML = ts.players.sort((a,b)=>(ts.scores[b.id]||0)-(ts.scores[a.id]||0)).map(p=>`<div class="score-row ${p.id===winnerId?'winner':''}"><div class="score-player">${p.id===winnerId?'🏆 ':''}${escHtml(p.name)}</div><div class="score-pts">${ts.scores[p.id]||0} pts</div></div>`).join('');
  }
  const playAgainBtn = document.getElementById('play-again-btn');
  if (ts?.hostId === state.player.id) playAgainBtn.style.display = '';
  else playAgainBtn.style.display = 'none';
  document.getElementById('gameover-modal').classList.add('active');
}

function playAgain() {
  document.getElementById('gameover-modal').classList.remove('active');
  state.socket.emit('playAgain', { tableId: state.tableId });
}

function goLobby() {
  document.getElementById('gameover-modal').classList.remove('active');
  leaveTable();
}

function init() {
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    const user = tg.initDataUnsafe?.user;
    if (user) {
      state.player.name = user.first_name + (user.last_name ? ' '+user.last_name : '');
      state.player.telegramId = user.id;
      state.player.avatar = user.first_name ? user.first_name[0].toUpperCase() : '👤';
    }
  } else {
    const names = ['Виктор','Анна','Максим','Олена','Дмитро','Катерина'];
    state.player.name = names[Math.floor(Math.random()*names.length)];
    state.player.avatar = state.player.name[0];
    state.player.telegramId = Math.floor(Math.random()*1e9);
  }
  document.getElementById('lobby-name').textContent = state.player.name;
  document.getElementById('lobby-avatar').textContent = state.player.avatar;
  
  // Запускаем подключение
  connectSocket();
}

window.addEventListener('load', init);
setInterval(()=>{ if(document.getElementById('lobby-screen').classList.contains('active')) refreshTables(); }, 10000);
</script>
</body>
</html>
