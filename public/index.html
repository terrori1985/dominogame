<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎲 Domino - Pro</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
/* Базовые стили (сохраняем существующие) */
:root {
  --felt: #1a4a2e;
  --felt-light: #1e5535;
  --felt-dark: #122d1d;
  --gold: #d4a843;
  --gold-light: #f0c862;
  --gold-dark: #a07820;
  --tile-bg: #fdf8ee;
  --tile-border: #c8b88a;
  --tile-dot: #1a1a1a;
  --tile-shadow: rgba(0,0,0,0.4);
  --text-on-felt: #e8d9b0;
  --panel-bg: rgba(0,0,0,0.45);
  --panel-border: rgba(212,168,67,0.3);
  --radius: 10px;
}
/* Тема "Классика" */
body.theme-classic { --felt: #1a4a2e; --felt-light: #1e5535; --tile-bg: #fdf8ee; --tile-border: #c8b88a; }
/* Тема "Мрамор" */
body.theme-marble { --felt: #2c3e50; --felt-light: #34495e; --tile-bg: #ecf0f1; --tile-border: #bdc3c7; --tile-dot: #2c3e50; --gold: #e67e22; }
/* Тема "Ночь" */
body.theme-night { --felt: #1a1a2e; --felt-light: #16213e; --tile-bg: #0f3460; --tile-border: #533483; --tile-dot: #e94560; --tile-bg: #1a1a2e; --text-on-felt: #e94560; --gold: #e94560; }

/* Стиль костей "Классика" */
.tile-style-classic .domino-tile { border-radius: 7px; border-width: 2px; }
.tile-style-classic .dot { background: #1a1a1a; }
/* Стиль костей "Цветной" */
.tile-style-colorful .domino-tile { background: linear-gradient(135deg, #fff8e7, #ffe4b5); border-width: 3px; border-color: #ff8c00; border-radius: 12px; }
.tile-style-colorful .dot { background: linear-gradient(135deg, #ff6b6b, #ee5a24); box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
/* Стиль костей "Минимал" */
.tile-style-minimal .domino-tile { background: #ffffff; border-width: 1px; border-color: #ddd; border-radius: 4px; box-shadow: none; }
.tile-style-minimal .dot { background: #333; width: 6px; height: 6px; }

/* Остальные стили (сохраняем из вашего оригинального файла) */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--felt-dark); color: var(--text-on-felt); user-select: none; }
.screen { position: absolute; inset: 0; display: none; flex-direction: column; }
.screen.active { display: flex; }
/* ... (все остальные стили из вашего файла) ... */

/* Новые стили для магазина и настроек */
.shop-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.95);
  border-top: 2px solid var(--gold);
  border-radius: 20px 20px 0 0;
  padding: 20px;
  transform: translateY(100%);
  transition: transform 0.3s ease;
  z-index: 400;
}
.shop-panel.active { transform: translateY(0); }
.shop-tile {
  display: inline-block;
  margin: 5px;
  cursor: pointer;
  transition: transform 0.2s;
}
.shop-tile:hover { transform: scale(1.1); }
.shop-tile.disabled { opacity: 0.3; cursor: not-allowed; }
.settings-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 50px;
  height: 50px;
  background: var(--gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 100;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.settings-panel {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  background: var(--felt);
  border: 2px solid var(--gold);
  border-radius: 20px;
  padding: 20px;
  width: 90%;
  max-width: 350px;
  z-index: 500;
  display: none;
  opacity: 0;
  transition: all 0.3s;
}
.settings-panel.active {
  display: block;
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
.score-board {
  background: rgba(0,0,0,0.5);
  border-radius: 10px;
  padding: 10px;
  margin: 10px;
  text-align: center;
}
.score-board h3 { color: var(--gold); margin-bottom: 5px; }
.score-list { font-size: 14px; }
.winner-animation {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 48px;
  font-weight: bold;
  color: gold;
  text-shadow: 0 0 20px rgba(255,215,0,0.8);
  z-index: 600;
  animation: winnerPulse 1s ease-out;
  pointer-events: none;
}
@keyframes winnerPulse {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
}
</style>
</head>
<body class="theme-classic tile-style-classic">

<!-- Все экраны (лобби, ожидание, игра) - такие же как в вашем файле -->
<!-- ... (вставьте полную разметку из вашего файла) ... -->

<div class="settings-btn" onclick="toggleSettings()">⚙️</div>

<div class="settings-panel" id="settings-panel">
  <h3 style="color:var(--gold); text-align:center; margin-bottom:15px">Настройки</h3>
  <div style="margin-bottom:15px">
    <label>🎨 Тема стола:</label>
    <select id="theme-select" onchange="changeTheme(this.value)">
      <option value="classic">Классика (зеленый)</option>
      <option value="marble">Мрамор (синий)</option>
      <option value="night">Ночь (темный)</option>
    </select>
  </div>
  <div style="margin-bottom:15px">
    <label>🎲 Стиль костей:</label>
    <select id="tilestyle-select" onchange="changeTileStyle(this.value)">
      <option value="classic">Классика</option>
      <option value="colorful">Цветной</option>
      <option value="minimal">Минимал</option>
    </select>
  </div>
  <div style="margin-bottom:15px">
    <label>🔊 Звуки:</label>
    <button onclick="testSound()">Тест звука</button>
    <label style="margin-left:10px">
      <input type="checkbox" id="sound-toggle" checked> Вкл/Выкл
    </label>
  </div>
  <div style="margin-bottom:15px">
    <label>📊 Таблица рекордов:</label>
    <div id="score-stats" class="score-board">
      <h3>Статистика игроков</h3>
      <div id="global-scores" class="score-list">Загрузка...</div>
    </div>
  </div>
  <button onclick="toggleSettings()" style="width:100%; padding:10px; background:var(--gold); border:none; border-radius:10px; cursor:pointer">Закрыть</button>
</div>

<div class="shop-panel" id="shop-panel">
  <div style="display:flex; justify-content:space-between; margin-bottom:10px">
    <h3>🃏 Магазин костей</h3>
    <button onclick="closeShop()" style="background:none; border:none; color:white; font-size:20px">✕</button>
  </div>
  <div id="shop-tiles" style="display:flex; flex-wrap:wrap; justify-content:center; max-height:200px; overflow-y:auto"></div>
  <div style="margin-top:10px; text-align:center">
    <button onclick="buyTile()" class="btn btn-primary">Купить кость (1 очко)</button>
  </div>
</div>

<script>
// ===== НОВЫЕ ФУНКЦИИ =====

// Звуковая система с возможностью отключения
let soundEnabled = true;
const soundCheckbox = document.getElementById('sound-toggle');
if (soundCheckbox) {
  soundCheckbox.addEventListener('change', (e) => { soundEnabled = e.target.checked; });
}

function playSoundEffect(type) {
  if (!soundEnabled) return;
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();
    const now = ctx.currentTime;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g);
    g.connect(ctx.destination);
    
    if (type === 'place') {
      o.frequency.setValueAtTime(440, now);
      o.frequency.exponentialRampToValueAtTime(280, now + 0.15);
      g.gain.setValueAtTime(0.2, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      o.start(now);
      o.stop(now + 0.2);
    } else if (type === 'draw') {
      o.type = 'triangle';
      o.frequency.setValueAtTime(300, now);
      o.frequency.exponentialRampToValueAtTime(500, now + 0.1);
      g.gain.setValueAtTime(0.15, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      o.start(now);
      o.stop(now + 0.15);
    } else if (type === 'win') {
      [523, 659, 784].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        const t = now + i * 0.12;
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
        osc.start(t);
        osc.stop(t + 0.3);
      });
    }
  } catch(e) { console.log('Audio error:', e); }
}

function testSound() { playSoundEffect('place'); }

// Смена темы
function changeTheme(theme) {
  document.body.className = document.body.className.replace(/theme-\w+/, '');
  document.body.classList.add(`theme-${theme}`);
  localStorage.setItem('domino_theme', theme);
}

function changeTileStyle(style) {
  document.body.className = document.body.className.replace(/tile-style-\w+/, '');
  document.body.classList.add(`tile-style-${style}`);
  localStorage.setItem('domino_tilestyle', style);
}

// Загрузка сохраненных настроек
const savedTheme = localStorage.getItem('domino_theme');
if (savedTheme) changeTheme(savedTheme);
const savedStyle = localStorage.getItem('domino_tilestyle');
if (savedStyle) changeTileStyle(savedStyle);

// Система магазина (дополнительные кости из бонеярда)
let shopOpen = false;
let selectedShopTile = null;

function openShop() {
  if (!state.tableState || state.tableState.status !== 'playing') {
    showToast('Магазин доступен только во время игры');
    return;
  }
  if (!state.isMyTurn) {
    showToast('Сейчас не ваш ход!');
    return;
  }
  
  const boneyardCount = state.tableState.boneyardCount;
  if (boneyardCount === 0) {
    showToast('В магазине нет костей!');
    return;
  }
  
  // Показываем доступные кости из бонеярда (имитация)
  const shopDiv = document.getElementById('shop-tiles');
  shopDiv.innerHTML = '';
  for (let i = 0; i < Math.min(boneyardCount, 12); i++) {
    const dummyTile = [Math.floor(Math.random() * 7), Math.floor(Math.random() * 7)];
    const tileEl = createTileEl(dummyTile[0], dummyTile[1], 'hand');
    tileEl.classList.add('shop-tile');
    tileEl.onclick = (() => { selectedShopTile = dummyTile; });
    shopDiv.appendChild(tileEl);
  }
  
  document.getElementById('shop-panel').classList.add('active');
  shopOpen = true;
}

function closeShop() {
  document.getElementById('shop-panel').classList.remove('active');
  shopOpen = false;
  selectedShopTile = null;
}

function buyTile() {
  if (!selectedShopTile) {
    showToast('Выберите кость для покупки');
    return;
  }
  if (state.tableState.boneyardCount === 0) {
    showToast('В магазине нет костей!');
    closeShop();
    return;
  }
  
  // Отправляем запрос на покупку кости
  state.socket.emit('drawTile', { tableId: state.tableId });
  showToast('Куплена кость из магазина!');
  playSoundEffect('draw');
  closeShop();
}

// Показ победной анимации с очками
function showWinnerAnimation(winnerName, points) {
  const div = document.createElement('div');
  div.className = 'winner-animation';
  div.innerHTML = `🏆 ${winnerName} победил!<br>+${points} очков! 🏆`;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1000);
  playSoundEffect('win');
}

// Таблица рекордов (локальное хранилище)
function updateGlobalScores() {
  let scores = JSON.parse(localStorage.getItem('domino_scores') || '{}');
  const currentPlayer = state.player.name;
  if (currentPlayer && state.tableState?.scores?.[state.player.id]) {
    scores[currentPlayer] = (scores[currentPlayer] || 0) + (state.tableState.scores[state.player.id] || 0);
    localStorage.setItem('domino_scores', JSON.stringify(scores));
  }
  
  const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]).slice(0, 10);
  const scoresDiv = document.getElementById('global-scores');
  if (scoresDiv) {
    scoresDiv.innerHTML = sorted.map(([name, score]) => 
      `<div><strong>${name}</strong>: ${score} очков</div>`
    ).join('') || 'Нет данных';
  }
}

// Кнопка настроек
function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('active');
}

// Добавляем кнопку магазина в игровой интерфейс
function addShopButton() {
  const actionBar = document.querySelector('.action-bar');
  if (actionBar && !document.getElementById('shop-btn')) {
    const shopBtn = document.createElement('button');
    shopBtn.id = 'shop-btn';
    shopBtn.className = 'action-btn';
    shopBtn.innerHTML = '🛒 Магазин';
    shopBtn.onclick = openShop;
    shopBtn.style.flex = '0.5';
    actionBar.appendChild(shopBtn);
  }
}

// Переопределяем существующие функции для добавления звуков
const originalRenderGame = window.renderGame;
window.renderGame = function(ts) {
  if (originalRenderGame) originalRenderGame(ts);
  addShopButton();
  updateGlobalScores();
};

// Добавляем звук при ходе
const originalSelectTile = window.selectTile;
window.selectTile = function(idx, tile, ts) {
  if (originalSelectTile) originalSelectTile(idx, tile, ts);
  if (state.isMyTurn) playSoundEffect('draw');
};

// Анимация победы с очками
const originalShowGameOver = window.showGameOver;
window.showGameOver = function(winnerId, scores, reason, totalPips) {
  if (originalShowGameOver) originalShowGameOver(winnerId, scores, reason);
  const winner = state.tableState?.players.find(p => p.id === winnerId);
  if (winner && winner.id === state.player.id) {
    showWinnerAnimation(winner.name, totalPips || 0);
    updateGlobalScores();
  }
  playSoundEffect('win');
};

// Инициализация после загрузки
document.addEventListener('DOMContentLoaded', () => {
  updateGlobalScores();
  // Загружаем звуки при первом касании
  document.body.addEventListener('click', () => {
    if (soundEnabled) playSoundEffect('place');
  }, { once: true });
});

// Экспортируем функции для глобального доступа
window.openShop = openShop;
window.closeShop = closeShop;
window.buyTile = buyTile;
window.toggleSettings = toggleSettings;
window.changeTheme = changeTheme;
window.changeTileStyle = changeTileStyle;
window.testSound = testSound;
window.playSoundEffect = playSoundEffect;
</script>
</body>
</html>
